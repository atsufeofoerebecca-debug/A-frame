<!DOCTYPE html>
<html>

<head>
  <title>Modern Monochromatic A-Frame Scene</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script>
    AFRAME.registerComponent('modern-outdoors', {
      init: function () {
        let el = this.el;

        // Generate scattered fallen leaves (Red, Pink, Autumn mix)
        for (let i = 0; i < 600; i++) {
          let x = (Math.random() - 0.5) * 80;
          let z = (Math.random() - 0.5) * 80;

          // Leave the center room area empty
          if (Math.abs(x) < 9 && Math.abs(z) < 9) continue;
          // Leave the Paths mostly clear
          if (Math.abs(x + 3) < 2 && z > 7 && Math.random() > 0.2) continue;

          let leaf = document.createElement('a-entity');

          // A squashed shape to mimic a fallen leaf
          let leafShape = document.createElement('a-cone');
          leafShape.setAttribute('radius-bottom', '0.12');
          leafShape.setAttribute('radius-top', '0.01');
          leafShape.setAttribute('height', '0.02');

          // Randomize rotation so it lies flat on the ground with a slight tilt
          let rotY = Math.random() * 360;
          let rotX = (Math.random() - 0.5) * 30;
          let rotZ = (Math.random() - 0.5) * 30;
          leaf.setAttribute('rotation', `${rotX} ${rotY} ${rotZ}`);

          // Position slightly above the ground slightly randomized height to prevent Z-fighting
          let y = 0.01 + Math.random() * 0.02;
          leaf.setAttribute('position', `${x} ${y} ${z}`);

          // Color palette based on the uploaded image (vibrant reds, pinks, some green/brown)
          const colors = ['#EF4444', '#DC2626', '#F43F5E', '#BE123C', '#FDA4AF', '#65A30D', '#991B1B'];
          let color = colors[Math.floor(Math.random() * colors.length)];

          leafShape.setAttribute('color', color);
          leafShape.setAttribute('material', 'roughness: 0.9');

          leaf.appendChild(leafShape);
          el.appendChild(leaf);
        }
      }
    });
  </script>
</head>
